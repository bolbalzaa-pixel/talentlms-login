<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Намир Групп — Сургалтын систем</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .logo p {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    margin-bottom: 8px;
  }
  input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="email"]:focus {
    border-color: #0078d4;
  }
  button {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #006cbd; }
  .error {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: #fff0f0;
    border: 1px solid #ffcccc;
    border-radius: 8px;
    color: #cc0000;
    font-size: 14px;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Намир Групп</h1>
    <p>Сургалтын системд нэвтрэх</p>
  </div>

  <label for="email">Корпорат имэйл хаяг</label>
  <input type="email" id="email" placeholder="name@company.mn" />

  <button onclick="redirect()">Үргэлжлүүлэх</button>

  <div class="error" id="error">
    Таны имэйл домэйн танигдсангүй. Удирдлагатайгаа холбоо барина уу.
  </div>

  <div class="footer">Намир Групп © 2026</div>
</div>

<script>
const branchMap = {
  "novatek.mn"        : "engineering",
  "domus.mn"          : "engineering",
  "sigma3.mn"         : "engineering",
  "cablehouse.mn"     : "engineering",
  "numur.mn"          : "financial",
  "leasing.numur.mn"  : "financial",
  "drillex.mn"        : "industrial",
  "kemex.mn"          : "industrial",
  "mekhlopat.mn"      : "industrial1",
  "unitedparts.mn"    : "industrial1",
  "kms.mn"            : "industrial1",
  "bavariamotors.mn"  : "mobilityandlifestyle",
  "gangantogos.mn"    : "mobilityandlifestyle1",
  "unicom.mn"         : "mobilityandlifestyle2u",
  "ayangastore.mn"    : "mobilityandlifestyle2u",
  "namir.mn"          : "namir",
  "snowball.mn"       : "namir",
  "k2.international"  : "namir",
  "snowball.am"       : "namir",
  "blackswan.global"  : "namir"
};

function redirect() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const errorEl = document.getElementById("error");
  errorEl.style.display = "none";

  if (!email || !email.includes("@")) {
    errorEl.textContent = "Имэйл хаягаа зөв оруулна уу.";
    errorEl.style.display = "block";
    return;
  }

  const domain = email.split("@")[1];
  const branch = branchMap[domain];

  if (branch) {
    window.location.href = "https://" + branch + "-namirgroup.talentlms.com";
  } else {
    errorEl.textContent = "Таны имэйл домэйн танигдсангүй. Удирдлагатайгаа холбоо барина уу.";
    errorEl.style.display = "block";
  }
}

document.getElementById("email").addEventListener("keydown", function(e) {
  if (e.key === "Enter") redirect();
});
</script>

</body>
</html>
